<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlumberMatch — Phase 1 Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --midnight: #0E1E33;
    --deep-teal: #1A5F6E;
    --ocean: #2A8899;
    --mist: #7EC8D3;
    --foam: #C5E8ED;
    --warm-white: #F8FAFB;
    --dusk: #8A9BB0;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--midnight);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: ''; position: absolute;
    width: 700px; height: 700px; border-radius: 50%;
    background: radial-gradient(circle, rgba(42,136,153,0.15) 0%, transparent 65%);
    top: -200px; right: -100px; pointer-events: none;
  }
  body::after {
    content: ''; position: absolute;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(126,200,211,0.08) 0%, transparent 65%);
    bottom: -150px; left: 10%; pointer-events: none;
  }
  .gate {
    position: relative; z-index: 2;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(126,200,211,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%; max-width: 400px;
    text-align: center;
  }
  .kicker {
    display: inline-block;
    font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--mist);
    margin-bottom: 20px;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-weight: 400; font-size: 28px;
    line-height: 1.2; margin-bottom: 10px;
    color: white;
  }
  .sub {
    font-size: 14px; font-weight: 300;
    color: var(--dusk); line-height: 1.55;
    margin-bottom: 28px;
  }
  input[type=password] {
    width: 100%;
    padding: 14px 18px;
    font-family: inherit; font-size: 15px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(126,200,211,0.2);
    border-radius: 50px;
    color: white;
    outline: none;
    transition: border-color .15s;
  }
  input[type=password]::placeholder { color: var(--dusk); }
  input[type=password]:focus { border-color: var(--mist); }
  button {
    width: 100%;
    margin-top: 12px;
    padding: 14px 24px;
    font-family: inherit; font-size: 15px; font-weight: 600;
    background: var(--deep-teal);
    color: white;
    border: none; border-radius: 50px;
    cursor: pointer;
    transition: background .15s, transform .1s;
    box-shadow: 0 6px 24px rgba(26,95,110,0.4);
  }
  button:hover { background: var(--ocean); transform: translateY(-1px); }
  button:disabled { opacity: 0.6; cursor: wait; transform: none; }
  .err {
    margin-top: 14px;
    font-size: 13px; color: #ff8c7c;
    min-height: 18px;
  }
</style>
</head>
<body>
  <form class="gate" id="gate" autocomplete="off">
    <div class="kicker">SlumberMatch</div>
    <h1>Phase 1 report</h1>
    <p class="sub">Enter the password to view the Week 1 foundation report.</p>
    <input type="password" id="pw" placeholder="Password" autofocus required>
    <button type="submit" id="btn">Unlock</button>
    <div class="err" id="err"></div>
  </form>

  const ITER = 150000;

  const b64d = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));

  async function unlock(password) {
    const enc = new TextEncoder();
    const pwKey = await crypto.subtle.importKey('raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']);
    const aesKey = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: b64d(SALT), iterations: ITER, hash: 'SHA-256' },
      pwKey,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64d(IV) }, aesKey, b64d(CT));
    return new TextDecoder().decode(plain);
  }

  document.getElementById('gate').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    const pw = document.getElementById('pw').value;
    btn.disabled = true;
    btn.textContent = 'Unlocking…';
    err.textContent = '';
    try {
      const html = await unlock(pw);
      document.open();
      document.write(html);
      document.close();
    } catch (ex) {
      btn.disabled = false;
      btn.textContent = 'Unlock';
      err.textContent = 'Incorrect password.';
    }
  });
</script>
